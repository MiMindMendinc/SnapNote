<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNote ✨ — Next Gen</title>
    <meta name="description" content="Turn any photo into clean notes — privacy-first OCR, summaries, and Q&A in your browser.">
    <meta name="theme-color" content="#0f766e">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="assets/css/app.css">
    <script src="assets/vendor/tesseract.min.js"></script>
</head>
<body class="offwhite min-h-screen flex flex-col text-navy">
    <header class="bg-white shadow-sm border-b border-teal-200 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-teal-600 rounded-2xl flex items-center justify-center text-white text-2xl">📸</div>
                <div>
                    <h1 class="text-2xl sm:text-3xl font-bold tracking-tight teal leading-tight">SnapNote</h1>
                    <p class="text-xs text-teal-600 hidden sm:block">Next Gen • Privacy-first photo notes</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleBadges()" id="badgeBtn" class="bg-teal-50 hover:bg-teal-100 text-teal-800 px-4 py-2 rounded-2xl font-medium text-sm flex items-center gap-2" title="View achievements">
                    🏅 <span id="badgeCount">0/6</span>
                </button>
                <button onclick="installApp()" id="installBtn" class="hidden bg-teal-600 hover:bg-teal-700 text-white px-4 sm:px-6 py-2 rounded-2xl font-medium text-sm">Install</button>
            </div>
        </div>
    </header>

    <!-- Achievement Badges Panel -->
    <div id="badgesPanel" class="hidden bg-white border-b border-teal-100 shadow-inner">
        <div class="max-w-4xl mx-auto px-6 py-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold teal">🏅 Achievements</h2>
                <span id="badgeProgress" class="text-sm text-teal-600 font-medium">0 of 6 unlocked</span>
            </div>
            <div id="badgeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3"></div>
        </div>
    </div>

    <main class="flex-1 max-w-4xl mx-auto w-full px-6 py-8">
        <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-8">
            <div id="statusBar" class="hidden mb-4 px-4 py-3 rounded-2xl bg-teal-50 text-teal-800 text-sm font-medium"></div>

            <!-- Upload Area -->
            <div id="dropzone" class="dropzone border-4 border-dashed border-teal-300 rounded-3xl h-72 sm:h-80 flex flex-col items-center justify-center text-center cursor-pointer hover:border-teal-500">
                <div class="text-6xl mb-4">📷</div>
                <p class="text-xl font-medium navy">Drop a photo or tap to upload</p>
                <p class="text-sm text-teal-600 mt-2 px-4">Handwritten notes, receipts, forms — anything</p>
                <input type="file" id="fileInput" accept="image/*" capture="environment" class="hidden">
                <button type="button" onclick="document.getElementById('fileInput').click()" class="mt-6 px-8 py-3 bg-teal-100 hover:bg-teal-200 text-teal-800 rounded-2xl text-sm font-semibold">📸 Take Photo</button>
            </div>

            <!-- Preview -->
            <div id="preview" class="hidden mt-8">
                <img id="imagePreview" alt="Uploaded preview" class="mx-auto rounded-2xl shadow-md max-h-96">
                <button type="button" onclick="processImage()" id="processBtn" class="mt-6 w-full bg-teal-600 hover:bg-teal-700 text-white py-4 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3">
                    ✨ Extract Text & Summarize
                </button>
            </div>

            <!-- Results -->
            <div id="results" class="hidden mt-10 space-y-8">
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="text-xl font-semibold teal">📝 Extracted Text</h2>
                        <button type="button" onclick="copyText('ocrText')" class="text-sm text-teal-600 hover:text-teal-800 font-medium">Copy</button>
                    </div>
                    <div id="ocrText" class="bg-offwhite p-6 rounded-2xl text-base leading-relaxed whitespace-pre-wrap min-h-[120px]"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <div class="flex items-center justify-between mb-3">
                            <h2 class="text-xl font-semibold teal">📋 Summary</h2>
                            <button type="button" onclick="copyText('summary')" class="text-sm text-teal-600 hover:text-teal-800 font-medium">Copy</button>
                        </div>
                        <div id="summary" class="bg-offwhite p-6 rounded-2xl text-base"></div>
                    </div>
                    <div>
                        <h2 class="text-xl font-semibold mb-3 teal">🏷️ Keywords</h2>
                        <div id="keywords" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>

                <div id="proResults" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <h2 class="text-xl font-semibold mb-3 teal">📰 Headline</h2>
                        <div id="headline" class="bg-teal-50 p-6 rounded-2xl text-base font-medium"></div>
                    </div>
                    <div>
                        <h2 class="text-xl font-semibold mb-3 teal">🌐 Español</h2>
                        <div id="translation" class="bg-teal-50 p-6 rounded-2xl text-base"></div>
                    </div>
                </div>

                <div>
                    <h2 class="text-xl font-semibold mb-3 teal">❓ Ask anything</h2>
                    <div class="flex gap-3">
                        <input id="question" type="text" placeholder="What is the due date?" class="flex-1 px-6 py-4 rounded-3xl border border-teal-200 focus:outline-none focus:border-teal-500">
                        <button type="button" onclick="askQuestion()" class="bg-teal-600 hover:bg-teal-700 text-white px-6 sm:px-10 rounded-3xl font-semibold">Ask</button>
                    </div>
                    <div id="answer" class="mt-4 bg-offwhite p-6 rounded-2xl min-h-[60px]"></div>
                </div>

                <div class="flex flex-wrap gap-3 pt-2">
                    <button type="button" onclick="exportNotes()" class="px-6 py-3 bg-teal-100 hover:bg-teal-200 text-teal-800 rounded-2xl text-sm font-semibold">💾 Export .txt</button>
                    <button type="button" onclick="resetApp()" class="px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-2xl text-sm font-semibold">🔄 New Photo</button>
                </div>

                <!-- Pro Mode -->
                <div class="pt-6 border-t border-teal-100">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="proMode" class="w-5 h-5 accent-teal-600">
                        <span class="text-lg font-medium">Pro Mode (headlines + Spanish translation)</span>
                    </label>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center text-xs text-teal-700/60 py-8 px-4">
        SnapNote Next Gen • 100% local processing • <button type="button" onclick="toggleBadges()" class="underline hover:text-teal-800">View badges</button>
    </footer>

    <script>
        const BADGES = [
            { id: 'first_snap', emoji: '📸', name: 'First Snap', desc: 'Upload your first photo' },
            { id: 'text_master', emoji: '📝', name: 'Text Master', desc: 'Extract text with OCR' },
            { id: 'smart_ask', emoji: '❓', name: 'Smart Ask', desc: 'Ask a question about your note' },
            { id: 'pro_user', emoji: '⭐', name: 'Pro User', desc: 'Use Pro Mode on a note' },
            { id: 'app_installed', emoji: '📲', name: 'Installed', desc: 'Install SnapNote as an app' },
            { id: 'power_user', emoji: '🏆', name: 'Power User', desc: 'Unlock every achievement' }
        ]

        const SPANISH = {
            the: 'el', a: 'un', an: 'una', and: 'y', or: 'o', is: 'es', are: 'son', was: 'era',
            were: 'eran', be: 'ser', have: 'tener', has: 'tiene', had: 'tenía', do: 'hacer', does: 'hace',
            did: 'hizo', will: 'será', would: 'sería', can: 'puede', could: 'podría', should: 'debería',
            must: 'debe', may: 'puede', not: 'no', in: 'en', on: 'en', at: 'en', to: 'a', for: 'para',
            of: 'de', with: 'con', from: 'de', by: 'por', this: 'este', that: 'ese', these: 'estos',
            those: 'esos', it: 'lo', they: 'ellos', we: 'nosotros', you: 'tú', he: 'él', she: 'ella',
            i: 'yo', my: 'mi', your: 'tu', our: 'nuestro', their: 'su', what: 'qué', when: 'cuándo',
            where: 'dónde', who: 'quién', why: 'por qué', how: 'cómo', all: 'todo', some: 'algunos',
            note: 'nota', notes: 'notas', date: 'fecha', due: 'vencimiento', meeting: 'reunión',
            appointment: 'cita', reminder: 'recordatorio', important: 'importante', please: 'por favor',
            thank: 'gracias', thanks: 'gracias', today: 'hoy', tomorrow: 'mañana', yesterday: 'ayer',
            week: 'semana', month: 'mes', year: 'año', time: 'hora', phone: 'teléfono', email: 'correo',
            address: 'dirección', name: 'nombre', school: 'escuela', doctor: 'doctor', patient: 'paciente',
            medicine: 'medicina', prescription: 'receta', receipt: 'recibo', total: 'total', amount: 'cantidad',
            payment: 'pago', invoice: 'factura', summary: 'resumen', document: 'documento', photo: 'foto',
            text: 'texto', question: 'pregunta', answer: 'respuesta', copy: 'copiar', save: 'guardar'
        }

        let worker = null
        let currentText = ''
        let unlocked = loadBadges()

        function loadBadges() {
            try { return JSON.parse(localStorage.getItem('snapnote_badges') || '{}') } catch { return {} }
        }

        function saveBadges() {
            localStorage.setItem('snapnote_badges', JSON.stringify(unlocked))
        }

        function unlockBadge(id) {
            if (unlocked[id]) return
            unlocked[id] = Date.now()
            saveBadges()
            renderBadges()
            showStatus(`🏅 Achievement unlocked: ${BADGES.find(b => b.id === id)?.name}!`)
        }

        function checkPowerUser() {
            const core = BADGES.filter(b => b.id !== 'power_user').every(b => unlocked[b.id])
            if (core) unlockBadge('power_user')
        }

        function renderBadges() {
            const grid = document.getElementById('badgeGrid')
            grid.innerHTML = BADGES.map(b => {
                const on = !!unlocked[b.id]
                return `<div class="badge ${on ? 'unlocked' : 'locked'} bg-offwhite rounded-2xl p-3 text-center" title="${b.desc}">
                    <div class="text-3xl mb-1">${b.emoji}</div>
                    <div class="text-xs font-semibold navy">${b.name}</div>
                </div>`
            }).join('')
            const count = Object.keys(unlocked).length
            document.getElementById('badgeCount').textContent = `${count}/6`
            document.getElementById('badgeProgress').textContent = `${count} of 6 unlocked`
        }

        function toggleBadges() {
            document.getElementById('badgesPanel').classList.toggle('hidden')
        }

        function showStatus(msg) {
            const bar = document.getElementById('statusBar')
            bar.textContent = msg
            bar.classList.remove('hidden')
            setTimeout(() => bar.classList.add('hidden'), 4000)
        }

        async function initTesseract() {
            if (!worker) {
                showStatus('⏳ Loading OCR engine…')
                worker = await Tesseract.createWorker('eng', 1, {
                    workerPath: 'assets/vendor/worker.min.js',
                    corePath: 'assets/vendor/tesseract-core.wasm.js',
                    langPath: 'assets/vendor',
                    logger: m => {
                        if (m.status === 'recognizing text') showStatus(`🔍 Reading text… ${Math.round(m.progress * 100)}%`)
                    }
                })
            }
        }

        const dropzone = document.getElementById('dropzone')
        const fileInput = document.getElementById('fileInput')
        dropzone.addEventListener('click', () => fileInput.click())
        dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover') })
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'))
        dropzone.addEventListener('drop', e => {
            e.preventDefault()
            dropzone.classList.remove('dragover')
            handleFile(e.dataTransfer.files[0])
        })
        fileInput.addEventListener('change', e => handleFile(e.target.files[0]))

        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                showStatus('Please choose an image file (JPG, PNG, WEBP).')
                return
            }
            unlockBadge('first_snap')
            const reader = new FileReader()
            reader.onload = ev => {
                document.getElementById('imagePreview').src = ev.target.result
                document.getElementById('preview').classList.remove('hidden')
                document.getElementById('dropzone').classList.add('hidden')
                document.getElementById('results').classList.add('hidden')
            }
            reader.readAsDataURL(file)
        }

        function buildSummary(text) {
            const sentences = text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 5)
            if (!sentences.length) return 'No summary available.'
            return sentences.slice(0, 4).join('. ') + (sentences.length > 4 ? '…' : '.')
        }

        function buildKeywords(text) {
            const words = text.toLowerCase().match(/\b\w{4,}\b/g) || []
            const freq = {}
            words.forEach(w => { freq[w] = (freq[w] || 0) + 1 })
            return Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 8)
        }

        function buildHeadline(text) {
            const first = text.split(/[.!?\n]+/).map(s => s.trim()).find(s => s.length > 3)
            if (!first) return 'Untitled Note'
            return first.length > 80 ? first.slice(0, 77) + '…' : first
        }

        function translateToSpanish(text) {
            return text.split(/(\s+|[.,!?;:()""''\[\]])/).map(token => {
                const key = token.toLowerCase().replace(/[^a-z']/g, '')
                if (!key) return token
                const translated = SPANISH[key]
                if (!translated) return token
                return token[0] === token[0].toUpperCase() ? translated.charAt(0).toUpperCase() + translated.slice(1) : translated
            }).join('')
        }

        async function processImage() {
            const btn = document.getElementById('processBtn')
            btn.disabled = true
            btn.classList.add('processing')
            try {
                await initTesseract()
                const img = document.getElementById('imagePreview').src
                document.getElementById('results').classList.add('hidden')
                const { data: { text } } = await worker.recognize(img)
                currentText = text.trim()
                document.getElementById('ocrText').textContent = currentText || 'No text found'
                document.getElementById('summary').textContent = buildSummary(currentText)
                const kws = buildKeywords(currentText)
                document.getElementById('keywords').innerHTML = kws.length
                    ? kws.map(([word]) => `<span class="inline-block bg-teal-100 text-teal-800 px-4 py-1 rounded-2xl text-sm">${word}</span>`).join('')
                    : '<span class="text-sm text-teal-600">No keywords</span>'

                const proOn = document.getElementById('proMode').checked
                const proBox = document.getElementById('proResults')
                if (proOn && currentText) {
                    document.getElementById('headline').textContent = buildHeadline(currentText)
                    document.getElementById('translation').textContent = translateToSpanish(buildSummary(currentText))
                    proBox.classList.remove('hidden')
                    unlockBadge('pro_user')
                } else {
                    proBox.classList.add('hidden')
                }

                document.getElementById('results').classList.remove('hidden')
                unlockBadge('text_master')
                checkPowerUser()
                showStatus('✅ Text extracted successfully!')
            } catch (err) {
                showStatus('❌ OCR failed: ' + err.message)
            } finally {
                btn.disabled = false
                btn.classList.remove('processing')
            }
        }

        function askQuestion() {
            const q = document.getElementById('question').value.trim().toLowerCase()
            if (!q || !currentText) return
            const terms = q.split(/\s+/).filter(w => w.length > 2)
            const sentences = currentText.split(/[.!?]+/)
            const scored = sentences.map(s => ({
                s,
                score: terms.reduce((n, w) => n + (s.toLowerCase().includes(w) ? 1 : 0), 0)
            })).sort((a, b) => b.score - a.score)
            const best = scored[0]
            document.getElementById('answer').textContent = best && best.score > 0
                ? best.s.trim()
                : "I couldn't find a direct answer in the note. Try rephrasing!"
            unlockBadge('smart_ask')
            checkPowerUser()
        }

        document.getElementById('question').addEventListener('keydown', e => {
            if (e.key === 'Enter') askQuestion()
        })

        document.getElementById('proMode').addEventListener('change', () => {
            if (currentText && !document.getElementById('results').classList.contains('hidden')) {
                processImage()
            }
        })

        function copyText(id) {
            const el = document.getElementById(id)
            navigator.clipboard.writeText(el.textContent).then(() => showStatus('📋 Copied to clipboard!'))
        }

        function exportNotes() {
            const body = [
                'SnapNote Export',
                '==============',
                '',
                'EXTRACTED TEXT',
                currentText,
                '',
                'SUMMARY',
                document.getElementById('summary').textContent,
                '',
                'KEYWORDS',
                [...document.getElementById('keywords').querySelectorAll('span')].map(s => s.textContent).join(', ')
            ].join('\n')
            const blob = new Blob([body], { type: 'text/plain' })
            const a = document.createElement('a')
            a.href = URL.createObjectURL(blob)
            a.download = 'snapnote-export.txt'
            a.click()
            URL.revokeObjectURL(a.href)
            showStatus('💾 Notes exported!')
        }

        function resetApp() {
            document.getElementById('preview').classList.add('hidden')
            document.getElementById('results').classList.add('hidden')
            document.getElementById('dropzone').classList.remove('hidden')
            document.getElementById('fileInput').value = ''
            currentText = ''
        }

        let deferredPrompt
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault()
            deferredPrompt = e
            document.getElementById('installBtn').classList.remove('hidden')
        })

        async function installApp() {
            if (!deferredPrompt) return
            deferredPrompt.prompt()
            const { outcome } = await deferredPrompt.userChoice
            if (outcome === 'accepted') {
                document.getElementById('installBtn').classList.add('hidden')
                unlockBadge('app_installed')
                checkPowerUser()
            }
            deferredPrompt = null
        }

        window.addEventListener('appinstalled', () => {
            unlockBadge('app_installed')
            checkPowerUser()
        })

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('SnapNote app shell cached'))
                .catch(err => console.log('SW error', err))
        }

        renderBadges()
    </script>
</body>
</html>
